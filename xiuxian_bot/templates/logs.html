{% extends 'base.html' %}
{% block title %}账号日志{% endblock %}
{% block content %}
<section class="panel">
  <div class="panel-head">
    <h1>账号日志 #{{ account.id }} - {{ account.name }}</h1>
    <div class="actions">
      <a href="/accounts/{{ account.id }}/messages" class="btn btn-light">消息归档</a>
      <a href="/accounts/{{ account.id }}/edit" class="btn btn-light">编辑账号</a>
      <a href="/" class="btn btn-light">返回</a>
    </div>
  </div>
  {% if snapshot %}
  <p class="muted">运行状态：{{ snapshot.state }}{% if snapshot.message %} / {{ snapshot.message }}{% endif %}</p>
  {% endif %}
  <pre class="log-box">{{ content or '暂无日志' }}</pre>
</section>
{% endblock %}
