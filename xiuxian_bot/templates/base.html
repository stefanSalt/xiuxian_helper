<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}xiuxian helper{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', path='/style.css') }}">
</head>
<body>
  <header class="topbar">
    <div class="brand"><a href="/">xiuxian helper</a></div>
    {% if request.cookies.get('xiuxian_admin') %}
    <form method="post" action="/logout">
      <button type="submit" class="btn btn-light">退出</button>
    </form>
    {% endif %}
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
